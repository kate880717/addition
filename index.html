<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>순서대로 말해요</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'flex','flex-row','flex-col','flex-1','flex-shrink-0',
        'flex-wrap','items-center','justify-center','justify-between','justify-around',
        'gap-2','gap-3','gap-4','gap-5','gap-6','gap-7','gap-8',
        'content-start','overflow-hidden'
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <!-- 모바일 드래그앤드롭 폴리필 -->
  <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@3.0.0-rc.0/index.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@3.0.0-rc.0/default.css">

  <style>
    * { box-sizing: border-box; scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      user-select: none; -webkit-user-select: none;
      background: #f0fdf4;
    }
    #root { width: 100%; height: 100%; overflow: hidden; }
    .word-keep { word-break: keep-all; }

    /* 레이아웃 보조 클래스 - Tailwind CDN 누락 방지 */
    .row { display: flex !important; flex-direction: row !important; }
    .col { display: flex !important; flex-direction: column !important; }
    .f1 { flex: 1 !important; }
    .fshrink0 { flex-shrink: 0 !important; }
    .screen-wrap { height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 16px; }

    /* 슬롯(빈칸) 스타일 */
    .slot-box {
      background: #f8fafc;
      border: 3px dashed #cbd5e1;
      border-radius: 1rem;
      min-height: 68px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 6px;
      transition: background 0.2s, border-color 0.2s;
    }
    .slot-box.drag-over {
      background: #dcfce7;
      border-color: #22c55e;
    }

    /* 드래그 카드 스타일 */
    .drag-card {
      background: #fff;
      border-radius: 0.875rem;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      border: 2px solid #e2e8f0;
      cursor: grab;
      touch-action: none;
      width: 100%;
    }
    .drag-card:active { cursor: grabbing; box-shadow: 0 6px 16px rgba(0,0,0,0.15); border-color: #22c55e; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    window.onload = function() {
      MobileDragDrop.polyfill({
        dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride
      });
      window.addEventListener('touchmove', function() {}, {passive: false});
    };

    // ★ 구글 앱스 스크립트 배포 후 URL을 이곳에 넣으세요.
    window.GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxjTrd4Rv7Fi3NLbl0Fn5sDtbFlg5XA_7pRzUCn3qoZ7TTm9uYeIYXCaUJiIQRdtrkS/exec';

    /*
      이모지 중복 수정:
        Q1: 올챙이 🐸→🐟 (개구리와 구분)
        Q2: 번데기 🪹→🫙 (고치 모양)
        Q3: 씨앗 🫘→🌰 (도토리)
        Q4: 겨울 ❄️→⛄ (눈사람, 더 직관적)
        Q5: 씨앗 🫘→🌰, 싹 🌱→🌿 (Q3과 구분), 꽃 🌺→🌸
        Q12: 손비비기 👏→🙌 (쌍수)
        Q14: 3단계로 단순화 (냉장고 제거)
        Q16: 흙덮기 🟤→🫳, 물주기 🚿→🪣 (Q12와 구분)
        Q18: 편지보내기→도시락 싸기 (낯선 우표/우체통 대신 친숙한 경험)
        Q20: 그네 ⛓️→🎠 (회전목마, 놀이기구 이모지)
    */
    const defaultQuestions = [
      // ── 순환(cyclic) ──
      {id:1,type:"cyclic",title:"개구리의 한살이",concept:"개구리는 알에서 깨어나 올챙이가 되고 개구리가 돼요.",
        cards:[{id:"1-1",text:"알",img:"🥚"},{id:"1-2",text:"올챙이",img:"🐟"},{id:"1-3",text:"개구리",img:"🐸"}]},
      {id:2,type:"cyclic",title:"나비의 한살이",concept:"나비는 알에서 깨어나 애벌레가 되고 번데기를 거쳐 나비가 돼요.",
        cards:[{id:"2-1",text:"알",img:"🥚"},{id:"2-2",text:"애벌레",img:"🐛"},{id:"2-3",text:"번데기",img:"🫙"},{id:"2-4",text:"나비",img:"🦋"}]},
      {id:3,type:"cyclic",title:"사과나무의 성장",concept:"씨앗에서 싹이 나고 자라서 맛있는 사과가 열려요.",
        cards:[{id:"3-1",text:"씨앗",img:"🌰"},{id:"3-2",text:"새싹",img:"🌱"},{id:"3-3",text:"사과나무",img:"🌳"},{id:"3-4",text:"사과",img:"🍎"}]},
      {id:4,type:"cyclic",title:"사계절의 변화",concept:"봄, 여름, 가을, 겨울이 지나면 다시 봄이 찾아와요.",
        cards:[{id:"4-1",text:"봄",img:"🌼"},{id:"4-2",text:"여름",img:"☀️"},{id:"4-3",text:"가을",img:"🍁"},{id:"4-4",text:"겨울",img:"⛄"}]},
      {id:5,type:"cyclic",title:"강낭콩의 한살이",concept:"강낭콩은 씨앗에서 싹이 트고 꽃을 피운 뒤 다시 강낭콩이 돼요.",
        cards:[{id:"5-1",text:"씨앗",img:"🌰"},{id:"5-2",text:"싹",img:"🌿"},{id:"5-3",text:"꽃",img:"🌸"},{id:"5-4",text:"강낭콩",img:"🫘"}]},
      {id:6,type:"cyclic",title:"하루의 변화",concept:"아침, 점심, 저녁, 밤이 지나면 또 아침이 밝아와요.",
        cards:[{id:"6-1",text:"아침",img:"🌅"},{id:"6-2",text:"점심",img:"🌞"},{id:"6-3",text:"저녁",img:"🌆"},{id:"6-4",text:"밤",img:"🌃"}]},
      {id:7,type:"cyclic",title:"닭의 성장",concept:"닭은 알에서 깨어나 병아리가 되고 닭이 돼요.",
        cards:[{id:"7-1",text:"알",img:"🥚"},{id:"7-2",text:"병아리",img:"🐥"},{id:"7-3",text:"닭",img:"🐔"}]},
      {id:8,type:"cyclic",title:"달의 변화",concept:"달은 초승달에서 반달, 보름달로 커졌다가 다시 작아져요.",
        cards:[{id:"8-1",text:"초승달",img:"🌙"},{id:"8-2",text:"반달",img:"🌓"},{id:"8-3",text:"보름달",img:"🌕"}]},
      // ── 순서(linear) ──
      {id:9,type:"linear",title:"양치질 하기",concept:"치약을 짜서 이를 닦은 뒤 물로 헹궈요.",
        cards:[{id:"9-1",text:"치약 짜기",img:"🪥"},{id:"9-2",text:"이 닦기",img:"🦷"},{id:"9-3",text:"물로 헹구기",img:"🚰"}]},
      {id:10,type:"linear",title:"횡단보도 건너기",concept:"횡단보도에서는 먼저 멈추고 살펴본 뒤에 건너요.",
        cards:[{id:"10-1",text:"멈추기",img:"🛑"},{id:"10-2",text:"살피기",img:"👀"},{id:"10-3",text:"건너기",img:"🚶"}]},
      {id:11,type:"linear",title:"샌드위치 만들기",concept:"식빵 위에 잼을 바르고 햄을 올린 뒤 빵으로 덮어요.",
        cards:[{id:"11-1",text:"식빵 놓기",img:"🍞"},{id:"11-2",text:"잼 바르기",img:"🍯"},{id:"11-3",text:"햄 올리기",img:"🥓"},{id:"11-4",text:"식빵 덮기",img:"🥪"}]},
      {id:12,type:"linear",title:"손 씻기",concept:"비누칠을 하고 손을 비빈 뒤에 물로 헹궈야 해요.",
        cards:[{id:"12-1",text:"비누칠하기",img:"🧼"},{id:"12-2",text:"손 비비기",img:"🙌"},{id:"12-3",text:"물로 헹구기",img:"🚿"}]},
      {id:13,type:"linear",title:"책 빌리기",concept:"읽고 싶은 책을 고르고 선생님께 가서 빌려요.",
        cards:[{id:"13-1",text:"책 고르기",img:"📚"},{id:"13-2",text:"선생님께 가기",img:"👩‍🏫"},{id:"13-3",text:"책 빌리기",img:"📖"}]},
      {id:14,type:"linear",title:"우유 마시기",concept:"우유를 꺼내 컵에 따른 뒤 맛있게 마셔요.",
        cards:[{id:"14-1",text:"우유 꺼내기",img:"🥛"},{id:"14-2",text:"컵에 따르기",img:"🫗"},{id:"14-3",text:"마시기",img:"😋"}]},
      {id:15,type:"linear",title:"방 청소하기",concept:"쓰레기를 버리고 바닥을 쓴 뒤 깨끗하게 닦아요.",
        cards:[{id:"15-1",text:"쓰레기 버리기",img:"🗑️"},{id:"15-2",text:"바닥 쓸기",img:"🧹"},{id:"15-3",text:"바닥 닦기",img:"🧽"}]},
      {id:16,type:"linear",title:"씨앗 심기",concept:"화분에 흙을 넣고 씨앗을 놓은 뒤 흙을 덮고 물을 줘요.",
        cards:[{id:"16-1",text:"흙 넣기",img:"🪴"},{id:"16-2",text:"씨앗 넣기",img:"🫘"},{id:"16-3",text:"흙 덮기",img:"🫳"},{id:"16-4",text:"물 주기",img:"🪣"}]},
      {id:17,type:"linear",title:"생일 파티",concept:"케이크에 촛불을 켜고 노래를 부른 뒤 촛불을 꺼요.",
        cards:[{id:"17-1",text:"촛불 켜기",img:"🕯️"},{id:"17-2",text:"노래 부르기",img:"🎵"},{id:"17-3",text:"촛불 끄기",img:"🎂"}]},
      {id:18,type:"linear",title:"도시락 싸기",concept:"밥을 담고 반찬을 넣은 뒤 뚜껑을 닫아 가방에 넣어요.",
        cards:[{id:"18-1",text:"밥 담기",img:"🍚"},{id:"18-2",text:"반찬 넣기",img:"🥗"},{id:"18-3",text:"뚜껑 닫기",img:"🥡"},{id:"18-4",text:"가방에 넣기",img:"🎒"}]},
      {id:19,type:"linear",title:"외출 준비",concept:"먼저 세수를 하고 옷을 입은 뒤 신발을 신어요.",
        cards:[{id:"19-1",text:"세수하기",img:"🫧"},{id:"19-2",text:"옷 입기",img:"👕"},{id:"19-3",text:"신발 신기",img:"👟"}]},
      {id:20,type:"linear",title:"놀이터 가기",concept:"놀이터에서 미끄럼틀을 타고 그네도 타고 집에 돌아와요.",
        cards:[{id:"20-1",text:"미끄럼틀 타기",img:"🛝"},{id:"20-2",text:"그네 타기",img:"🎠"},{id:"20-3",text:"집에 오기",img:"🏠"}]}
    ];
    const defaultStudents = ["김철수", "이영희", "박지민"];

    const { useState, useEffect, useRef } = React;

    /* ── 음성 / 효과음 ── */
    const speak = (text, soundOn) => {
      if (!soundOn) return;
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ko-KR'; u.rate = 0.85;
        window.speechSynthesis.speak(u);
      }
    };
    const playChime = (soundOn) => {
      if (!soundOn) return;
      try {
        const a = new (window.AudioContext||window.webkitAudioContext)();
        const t = a.currentTime, o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+.1); o.frequency.setValueAtTime(784,t+.2);
        g.gain.setValueAtTime(.2,t); g.gain.exponentialRampToValueAtTime(.01,t+1);
        o.start(t); o.stop(t+1);
      } catch(e){}
    };
    const playWrong = (soundOn) => {
      if (!soundOn) return;
      try {
        const a = new (window.AudioContext||window.webkitAudioContext)();
        const t = a.currentTime, o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination); o.type='triangle';
        o.frequency.setValueAtTime(150,t); o.frequency.linearRampToValueAtTime(100,t+.3);
        g.gain.setValueAtTime(.2,t); g.gain.exponentialRampToValueAtTime(.01,t+.5);
        o.start(t); o.stop(t+.5);
      } catch(e){}
    };
    const fireConfetti = () => {
      if (!window.confetti) return;
      const end = Date.now()+2000;
      const iv = setInterval(()=>{
        if(Date.now()>end) return clearInterval(iv);
        window.confetti({particleCount:40,spread:360,startVelocity:28,origin:{x:Math.random(),y:Math.random()-.2},zIndex:999});
      },200);
    };

    /* ── 수료증 캔버스 ── */
    function generateCanvas(name, score, total) {
      const canvas = document.createElement('canvas');
      canvas.width = 800; canvas.height = 1100;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,800,1100);
      ctx.fillStyle = '#f8fafc'; ctx.fillRect(0,0,800,400);
      ctx.fillStyle = '#1e3a8a'; ctx.font = 'bold 50px "Malgun Gothic",sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('탐험 결과', 400, 80);
      ctx.fillStyle = '#334155'; ctx.font = 'bold 36px "Malgun Gothic",sans-serif';
      ctx.fillText(`총 ${total}문제 중 ${score}문제 정답!`, 400, 180);
      const cy = 400;
      ctx.fillStyle = '#fffbeb'; ctx.fillRect(0,cy,800,700);
      ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 10; ctx.setLineDash([20,15]);
      ctx.strokeRect(40,cy+40,720,620); ctx.setLineDash([]);
      ctx.font='80px Arial'; ctx.fillText('🏆',400,cy+160);
      ctx.fillStyle='#92400e'; ctx.font='bold 60px "Malgun Gothic",sans-serif';
      ctx.fillText('훌륭한 이야기꾼 상',400,cy+260);
      ctx.fillStyle='#333'; ctx.font='bold 44px "Malgun Gothic",sans-serif';
      ctx.fillText(`${name} 친구`,400,cy+360);
      ctx.font='32px "Malgun Gothic",sans-serif'; ctx.fillStyle='#475569';
      ctx.fillText('위 어린이는 주어진 사건의 순서를',400,cy+450);
      ctx.fillText('모두 올바르게 이해하고 설명하였기에',400,cy+500);
      ctx.fillText('이 상장을 수여합니다.',400,cy+550);
      ctx.font='26px "Malgun Gothic",sans-serif'; ctx.fillStyle='#94a3b8';
      const d = new Date();
      ctx.fillText(`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`,400,cy+630);
      return canvas;
    }

    /* ── 원형 레이아웃 ── */
    const CircularLayout = ({items}) => {
      const R = 95;
      return (
        <div className="relative mx-auto flex items-center justify-center" style={{width:270,height:270}}>
          <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 270 270">
            <circle cx="135" cy="135" r="95" fill="none" stroke="#bbf7d0" strokeWidth="6" strokeDasharray="14 14"/>
          </svg>
          {items.map((it,i)=>{
            const a=(i/items.length)*2*Math.PI - Math.PI/2;
            return (
              <div key={i} className="absolute flex flex-col items-center" style={{transform:`translate(${R*Math.cos(a)}px,${R*Math.sin(a)}px)`}}>
                <div style={{fontSize:'2.8rem',background:'white',borderRadius:'50%',padding:'0.5rem',boxShadow:'0 4px 12px rgba(0,0,0,.15)',border:'4px solid #86efac'}}>{it.img}</div>
                <span style={{fontSize:'0.95rem',fontWeight:'900',marginTop:'4px',color:'#334155',background:'rgba(255,255,255,0.95)',padding:'2px 8px',borderRadius:'999px',whiteSpace:'nowrap'}}>{it.text}</span>
              </div>
            );
          })}
        </div>
      );
    };

    /* ── 직선 레이아웃 ── */
    const LinearLayout = ({items}) => (
      <div style={{display:'flex',flexWrap:'wrap',alignItems:'center',justifyContent:'center',gap:'0.5rem',padding:'0.5rem 0',width:'100%'}}>
        {items.map((it,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center'}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div style={{fontSize:'2.8rem',background:'white',borderRadius:'1rem',padding:'0.6rem',boxShadow:'0 4px 12px rgba(0,0,0,.15)',border:'4px solid #bfdbfe'}}>{it.img}</div>
              <span style={{fontSize:'0.95rem',fontWeight:'900',marginTop:'4px',color:'#334155',textAlign:'center',wordBreak:'keep-all'}}>{it.text}</span>
            </div>
            {i<items.length-1 && <svg style={{width:'1.75rem',height:'1.75rem',color:'#93c5fd',margin:'0 4px',flexShrink:0}} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>}
          </div>
        ))}
      </div>
    );

    /* ── 소리 토글 ── */
    const SoundToggle = ({soundOn, setSoundOn}) => {
      const toggle = () => {
        setSoundOn(!soundOn);
        try { const a = new (window.AudioContext||window.webkitAudioContext)(); if(a.state==='suspended') a.resume(); } catch(e){}
      };
      return (
        <button onClick={toggle} className={`fixed top-3 right-3 z-50 w-11 h-11 rounded-full shadow-lg flex items-center justify-center text-2xl border-2 transition-all ${soundOn ? 'bg-green-100 border-green-400 text-green-600' : 'bg-white border-slate-200 text-slate-400'}`}>
          {soundOn ? '🔊' : '🔇'}
        </button>
      );
    };

    /* ── 메인 앱 ── */
    const App = () => {
      const [phase, setPhase] = useState("loading");
      const [students, setStudents] = useState([]);
      const [selectedStudent, setSelectedStudent] = useState("");
      const [allQuestions, setAllQuestions] = useState([]);
      const [activeQuestions, setActiveQuestions] = useState([]);
      const [qIndex, setQIndex] = useState(0);

      const [slots, setSlots] = useState([]);
      const [pool, setPool] = useState([]);
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [dragOverIndex, setDragOverIndex] = useState(null);

      const [score, setScore] = useState(0);
      const [soundOn, setSoundOn] = useState(false);

      const [mediaRecorder, setMediaRecorder] = useState(null);
      const [isRecording, setIsRecording] = useState(false);
      const [audioBlob, setAudioBlob] = useState(null);
      const [audioBase64, setAudioBase64] = useState(null);
      const audioChunksRef = useRef([]);

      const currentQ = activeQuestions[qIndex];

      useEffect(()=>{
        const loadData = async () => {
          if (!window.GAS_API_URL || window.GAS_API_URL.trim()==='') {
            setStudents(defaultStudents); setSelectedStudent(defaultStudents[0]);
            setAllQuestions(defaultQuestions); setPhase("login"); return;
          }
          try {
            const res = await fetch(window.GAS_API_URL);
            const data = await res.json();
            const sts = data.students?.length ? data.students : defaultStudents;
            setStudents(sts); setSelectedStudent(sts[0]);
            setAllQuestions(data.questions?.length ? data.questions : defaultQuestions);
            setPhase("login");
          } catch(e) {
            setStudents(defaultStudents); setSelectedStudent(defaultStudents[0]);
            setAllQuestions(defaultQuestions); setPhase("login");
          }
        };
        loadData();
      },[]);

      const startMicRequest = () => setPhase("mic_request");

      const requestMicAccess = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          recorder.ondataavailable = (e) => { if(e.data.size>0) audioChunksRef.current.push(e.data); };
          recorder.onstop = () => {
            const blob = new Blob(audioChunksRef.current, {type:'audio/webm'});
            setAudioBlob(blob);
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => setAudioBase64(reader.result);
          };
          setMediaRecorder(recorder);
          speak(`환영합니다 ${selectedStudent} 친구!`, soundOn);
          if(!allQuestions.length){ alert("문제가 없습니다. 구글 시트를 확인해주세요."); return; }
          setPhase("count_select");
        } catch(err) {
          alert("마이크가 허용되지 않아 녹음 기능을 사용할 수 없습니다. 그래도 진행합니다!");
          speak(`환영합니다 ${selectedStudent} 친구!`, soundOn);
          if(!allQuestions.length){ alert("문제가 없습니다."); return; }
          setPhase("count_select");
        }
      };

      const startGame = (count) => {
        let s = [...allQuestions].sort(()=>0.5-Math.random());
        if(count!=='ALL') s = s.slice(0,count);
        setActiveQuestions(s); setQIndex(0); setScore(0); setPhase("concept");
      };

      const startQuiz = () => {
        const shuffled = [...currentQ.cards].sort(()=>0.5-Math.random());
        setPool(shuffled); setSlots(new Array(currentQ.cards.length).fill(null)); setPhase("quiz");
      };

      const tapPoolCard = (card) => {
        const i = slots.findIndex(s=>s===null);
        if(i===-1) return;
        const ns = [...slots]; ns[i]=card; setSlots(ns);
        setPool(pool.filter(c=>c.id!==card.id));
      };

      const tapSlotCard = (card, idx) => {
        if(!card) return;
        const ns = [...slots]; ns[idx]=null; setSlots(ns);
        setPool([...pool, card]);
      };

      const handleDragStart = (e, idx) => {
        setDraggedIndex(idx);
        if(e.dataTransfer){ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",""); }
      };
      const handleDragOver = (e, idx) => { e.preventDefault(); if(dragOverIndex!==idx) setDragOverIndex(idx); };
      const handleDragLeave = () => setDragOverIndex(null);
      const handleDrop = (e, dropIdx) => {
        e.preventDefault(); setDragOverIndex(null);
        if(draggedIndex===null||draggedIndex===dropIdx) return;
        const ns = [...slots]; const tmp=ns[draggedIndex]; ns[draggedIndex]=ns[dropIdx]; ns[dropIdx]=tmp;
        setSlots(ns); setDraggedIndex(null);
      };

      const checkAnswer = () => {
        if(slots.includes(null)){ alert("빈칸을 모두 채워주세요!"); return; }
        const ok = slots.every((it,i)=>it.id===currentQ.cards[i].id);
        if(ok){ setScore(s=>s+1); playChime(soundOn); fireConfetti(); speak("정답입니다!",soundOn); setPhase("feedback"); }
        else { playWrong(soundOn); setPhase("wrong"); }
      };

      const nextQuestion = () => {
        if(qIndex+1<activeQuestions.length){ setQIndex(qIndex+1); setPhase("concept"); }
        else { finishQuiz(); }
      };

      const retryQuestion = () => {
        const cards = [...slots.filter(it=>it), ...pool];
        setPool(cards.sort(()=>0.5-Math.random()));
        setSlots(new Array(currentQ.cards.length).fill(null)); setPhase("quiz");
      };

      const finishQuiz = () => {
        if(mediaRecorder){ setPhase("recording"); speak("모든 문제를 풀었어요! 배운 순서를 친구에게 다시 설명해보세요.",soundOn); }
        else { saveAndFinish(null); }
      };

      const handleStartRecording = () => {
        audioChunksRef.current=[]; setAudioBlob(null); setAudioBase64(null);
        if(mediaRecorder){ mediaRecorder.start(); setIsRecording(true); }
      };
      const handleStopRecording = () => {
        if(mediaRecorder&&isRecording){ mediaRecorder.stop(); setIsRecording(false); }
      };
      const handleDiscardRecording = () => { setAudioBlob(null); setAudioBase64(null); };

      const saveAndFinish = async (audioData) => {
        setPhase("submitting");
        const payload = { name:selectedStudent, score, total:activeQuestions.length, audioBase64:audioData!==undefined?audioData:audioBase64 };
        if(window.GAS_API_URL&&window.GAS_API_URL.trim()!==''){
          try { await fetch(window.GAS_API_URL,{method:'POST',body:JSON.stringify(payload)}); }
          catch(e){ console.error("저장 실패",e); }
        }
        setPhase("report");
        speak(`대단해요! ${activeQuestions.length}문제 중 ${score}문제를 맞췄어요.`,soundOn);
        fireConfetti();
      };

      const downloadReport = () => {
        const canvas = generateCanvas(selectedStudent, score, activeQuestions.length);
        const link = document.createElement('a');
        link.download = `순서대로말해요_수료증_${selectedStudent}.png`;
        link.href = canvas.toDataURL(); link.click();
      };

      /* ========== 화면별 렌더링 ========== */

      if(phase==="loading") return (
        <div className="flex items-center justify-center" style={{height:'100vh'}}>
          <div className="text-3xl font-bold text-green-600 animate-pulse">불러오는 중...</div>
        </div>
      );

      /* ── 로그인 ── */
      if(phase==="login") return (
        <div className="flex items-center justify-center p-5 bg-gradient-to-br from-green-50 to-emerald-100" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div style={{display:'flex',flexDirection:'row',gap:'2rem',width:'100%',maxWidth:'56rem',alignItems:'center'}}>
            <div className="flex-1 flex flex-col items-center text-center">
              <div className="text-8xl mb-4">📖</div>
              <h1 className="text-5xl font-black text-green-700 mb-3 drop-shadow-sm">순서대로 말해요!</h1>
              <p className="text-xl text-slate-600 font-bold word-keep">내 이름을 선택하고 재미있는 문제를 풀어봐요</p>
            </div>
            <div className="flex-1 bg-white p-8 rounded-3xl shadow-2xl border-4 border-green-100">
              <p className="text-lg font-bold text-slate-500 mb-3">이름을 선택해요 👇</p>
              <select className="w-full text-2xl p-4 bg-green-50 border-4 border-green-200 rounded-2xl mb-5 font-bold text-slate-700 focus:outline-none focus:border-green-500" value={selectedStudent} onChange={e=>setSelectedStudent(e.target.value)}>
                {students.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <button onClick={startMicRequest} className="w-full py-5 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-2xl shadow-lg active:scale-95 transition">시작하기 ▶</button>
            </div>
          </div>
        </div>
      );

      /* ── 마이크 요청 ── */
      if(phase==="mic_request") return (
        <div className="flex items-center justify-center p-5 bg-indigo-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div style={{background:'white',padding:'2rem',borderRadius:'1.5rem',boxShadow:'0 25px 50px -12px rgba(0,0,0,.25)',border:'8px solid #c7d2fe',display:'flex',flexDirection:'row',gap:'2rem',alignItems:'center',width:'100%',maxWidth:'48rem'}}>
            <div className="flex flex-col items-center flex-shrink-0">
              <div className="text-7xl mb-3 animate-bounce">🎤</div>
              <h2 className="text-xl text-indigo-600 font-black text-center">친구에게<br/>설명하기</h2>
            </div>
            <div className="flex-1">
              <div className="bg-indigo-50 p-5 rounded-2xl border-4 border-indigo-100 mb-5">
                <p className="text-xl leading-relaxed text-slate-700 font-bold break-keep">
                  문제를 다 풀고 난 뒤<br/>배운 내용을 다시 설명해 보는<br/>시간이에요! <span className="text-indigo-600 font-extrabold">마이크를 허용</span>해주세요.
                </p>
              </div>
              <button onClick={requestMicAccess} className="w-full bg-indigo-500 text-white text-2xl py-5 rounded-2xl shadow-lg font-bold active:scale-95 transition">🎙️ 마이크 허용하기</button>
            </div>
          </div>
        </div>
      );

      /* ── 문제 수 선택 ── */
      if(phase==="count_select") return (
        <div className="flex items-center justify-center p-5 bg-gradient-to-br from-green-50 to-emerald-100" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-2xl w-full border-4 border-green-100 text-center">
            <h2 className="text-4xl font-black text-slate-800 mb-2 word-keep">몇 문제를 풀어볼까요?</h2>
            <p className="text-lg text-green-600 font-bold mb-6">준비된 문제: {allQuestions.length}개</p>
            <div className="grid grid-cols-3 gap-4">
              {allQuestions.length>=5 && (
                <button onClick={()=>startGame(5)} className="py-6 bg-green-50 border-4 border-green-200 hover:border-green-500 rounded-2xl font-black text-xl text-green-700 shadow-md active:scale-95 transition flex flex-col items-center gap-2">
                  <span className="text-4xl">🌱</span><span>5문제</span>
                </button>
              )}
              {allQuestions.length>=10 && (
                <button onClick={()=>startGame(10)} className="py-6 bg-green-50 border-4 border-green-200 hover:border-green-500 rounded-2xl font-black text-xl text-green-700 shadow-md active:scale-95 transition flex flex-col items-center gap-2">
                  <span className="text-4xl">🌿</span><span>10문제</span>
                </button>
              )}
              <button onClick={()=>startGame('ALL')} className="py-6 bg-green-50 border-4 border-green-200 hover:border-green-500 rounded-2xl font-black text-xl text-green-700 shadow-md active:scale-95 transition flex flex-col items-center gap-2">
                <span className="text-4xl">🌳</span><span>모두</span>
              </button>
            </div>
          </div>
        </div>
      );

      /* ── 개념 설명 ── */
      if(phase==="concept") return (
        <div className="flex items-center justify-center p-4 bg-green-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div style={{width:'100%',maxWidth:'64rem',background:'white',borderRadius:'1.5rem',boxShadow:'0 25px 50px -12px rgba(0,0,0,.25)',borderBottom:'8px solid #bbf7d0',display:'flex',flexDirection:'row',overflow:'hidden',maxHeight:'calc(100vh - 32px)'}}>
            {/* 왼쪽: 설명 + 버튼 */}
            <div className="flex-1 p-7 flex flex-col justify-between">
              <div>
                <div className="inline-block bg-green-100 text-green-700 font-bold px-4 py-1.5 rounded-full mb-4 text-base">
                  문제 {qIndex+1} / {activeQuestions.length}
                </div>
                <h2 className="text-4xl font-black mb-4 text-slate-800 word-keep">{currentQ.title}</h2>
                <div className="bg-slate-50 p-5 rounded-2xl border-2 border-slate-100">
                  <p className="text-2xl font-bold text-slate-700 word-keep leading-relaxed border-l-8 border-green-300 pl-4 text-left">"{currentQ.concept}"</p>
                </div>
              </div>
              <button onClick={startQuiz} className="mt-5 w-full py-5 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-black text-2xl shadow-xl active:scale-95 transition flex items-center justify-center gap-3">
                문제 풀기 ▶
              </button>
            </div>
            {/* 오른쪽: 시각화 */}
            <div className="flex-1 bg-green-50 flex items-center justify-center p-6 border-l-4 border-green-100">
              {currentQ.type==='cyclic' ? <CircularLayout items={currentQ.cards}/> : <LinearLayout items={currentQ.cards}/>}
            </div>
          </div>
        </div>
      );

      /* ── 퀴즈 (2열 레이아웃) ── */
      if(phase==="quiz") return (
        <div className="flex flex-col p-3 bg-green-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          {/* 상단 헤더 */}
          <div style={{width:'100%',maxWidth:'64rem',margin:'0 auto 0.75rem',background:'white',padding:'0.6rem 1.25rem',borderRadius:'1rem',boxShadow:'0 2px 8px rgba(0,0,0,.05)',border:'2px solid #dcfce7',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <span style={{fontWeight:'700',color:'#94a3b8',fontSize:'1rem'}}>문제 {qIndex+1} / {activeQuestions.length}</span>
            <h2 style={{fontSize:'1.6rem',fontWeight:'900',color:'#1e293b',margin:0}}>{currentQ.title}</h2>
            <span style={{fontSize:'1rem',fontWeight:'700',color:'#16a34a'}}>카드를 터치해서 채우세요!</span>
          </div>
          {/* 메인 2열 */}
          <div style={{flex:1,width:'100%',maxWidth:'64rem',margin:'0 auto',display:'flex',flexDirection:'row',gap:'0.75rem',overflow:'hidden'}}>
            {/* 왼쪽: 슬롯 */}
            <div style={{flex:1,background:'white',borderRadius:'1rem',padding:'1rem',border:'4px solid #f1f5f9',boxShadow:'0 4px 16px rgba(0,0,0,.06)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <h3 style={{fontSize:'1.1rem',fontWeight:'800',color:'#94a3b8',marginBottom:'0.5rem',flexShrink:0}}>📌 순서대로 채우기</h3>
              <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'space-around',overflow:'hidden'}}>
                {slots.map((card, idx) => (
                  <div
                    key={idx}
                    className={`slot-box ${dragOverIndex===idx ? 'drag-over' : ''}`}
                    style={{marginBottom:'4px',minHeight:'72px'}}
                    onDragOver={(e)=>handleDragOver(e,idx)}
                    onDragLeave={handleDragLeave}
                    onDrop={(e)=>handleDrop(e,idx)}
                  >
                    <div style={{flexShrink:0,width:'2.2rem',height:'2.2rem',background:'#e2e8f0',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'900',color:'#64748b',marginRight:'0.75rem',fontSize:'1.1rem'}}>{idx+1}</div>
                    {card ? (
                      <div
                        className="drag-card flex-1"
                        draggable="true"
                        onDragStart={(e)=>handleDragStart(e,idx)}
                        onClick={()=>tapSlotCard(card,idx)}
                      >
                        <div style={{fontSize:'2.2rem',marginRight:'0.75rem',pointerEvents:'none'}}>{card.img}</div>
                        <div style={{fontSize:'1.2rem',fontWeight:'800',color:'#334155',wordBreak:'keep-all',pointerEvents:'none'}}>{card.text}</div>
                      </div>
                    ) : (
                      <div style={{flex:1,fontSize:'1.05rem',fontWeight:'700',color:'#cbd5e1'}}>카드를 선택하세요</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
            {/* 오른쪽: 카드풀 + 버튼 */}
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:'0.75rem',overflow:'hidden'}}>
              <div style={{flex:1,background:'#f8fafc',borderRadius:'1rem',padding:'1rem',border:'4px solid #e2e8f0',display:'flex',flexDirection:'column',overflow:'hidden'}}>
                <h3 style={{fontSize:'1.1rem',fontWeight:'800',color:'#94a3b8',marginBottom:'0.5rem',flexShrink:0}}>🃏 문제 카드</h3>
                <div style={{flex:1,display:'flex',flexWrap:'wrap',gap:'0.5rem',alignContent:'flex-start',justifyContent:'center',overflow:'hidden'}}>
                  {pool.length > 0 ? pool.map(card=>(
                    <div
                      key={card.id}
                      onClick={()=>tapPoolCard(card)}
                      style={{background:'white',padding:'0.6rem 0.8rem',borderRadius:'1rem',boxShadow:'0 2px 8px rgba(0,0,0,.08)',border:'4px solid #bfdbfe',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',flex:'1 1 calc(50% - 0.5rem)',minWidth:'90px',maxWidth:'160px',boxSizing:'border-box'}}
                    >
                      <div style={{fontSize:'2.5rem',marginBottom:'0.25rem'}}>{card.img}</div>
                      <div style={{fontSize:'1rem',fontWeight:'700',color:'#334155',textAlign:'center',wordBreak:'keep-all'}}>{card.text}</div>
                    </div>
                  )) : (
                    <div style={{fontSize:'1.1rem',fontWeight:'700',color:'#94a3b8',textAlign:'center',padding:'1rem',width:'100%'}}>모두 이동했어요!<br/>정답을 확인해보세요.</div>
                  )}
                </div>
              </div>
              <div style={{display:'flex',gap:'0.75rem',flexShrink:0}}>
                <button onClick={retryQuestion} style={{flex:1,padding:'1rem',background:'#94a3b8',color:'white',borderRadius:'1rem',fontWeight:'900',fontSize:'1.1rem',border:'none',cursor:'pointer'}}>🔄 다시</button>
                <button onClick={checkAnswer} style={{flex:2,padding:'1rem',background:'#22c55e',color:'white',borderRadius:'1rem',fontWeight:'900',fontSize:'1.1rem',border:'none',cursor:'pointer'}}>정답 확인 ✅</button>
              </div>
            </div>
          </div>
        </div>
      );

      /* ── 오답 ── */
      if(phase==="wrong") return (
        <div className="flex items-center justify-center p-5 bg-orange-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div className="w-full max-w-3xl bg-white p-8 rounded-3xl shadow-2xl border-8 border-orange-200 flex flex-row gap-8 items-center">
            <div className="flex-shrink-0 text-8xl">🤔</div>
            <div className="flex-1">
              <h2 className="text-4xl font-black text-orange-500 mb-4">순서가 달라요!</h2>
              <p className="text-xl font-bold text-slate-600 mb-6 word-keep leading-relaxed">틀린 곳의 순서를 드래그해서 바꾸어 다시 생각해 볼까요?</p>
              <button onClick={()=>setPhase("quiz")} className="w-full py-5 bg-orange-400 hover:bg-orange-500 text-white rounded-2xl font-black text-2xl shadow-xl active:scale-95 transition">
                이어서 다시 풀기 🔄
              </button>
            </div>
          </div>
        </div>
      );

      /* ── 정답 피드백 ── */
      if(phase==="feedback") return (
        <div className="flex items-center justify-center p-4 bg-green-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div className="w-full max-w-4xl bg-white p-7 rounded-3xl shadow-2xl border-8 border-green-300 flex flex-row gap-7 items-center">
            <div className="flex-shrink-0 flex flex-col items-center">
              <div className="text-8xl mb-2">🎉</div>
              <h2 className="text-3xl font-black text-green-500 text-center">정답!</h2>
            </div>
            <div className="flex-1 flex flex-col gap-4">
              <p className="text-lg font-bold text-slate-700 word-keep leading-relaxed border-l-8 border-green-200 pl-3">"{currentQ.concept}"</p>
              <div className="bg-green-50 p-3 rounded-2xl flex items-center justify-center">
                {currentQ.type==='cyclic' ? <CircularLayout items={currentQ.cards}/> : <LinearLayout items={currentQ.cards}/>}
              </div>
              <button onClick={nextQuestion} className="w-full py-5 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-black text-2xl shadow-xl active:scale-95 transition">
                {qIndex+1 < activeQuestions.length ? '다음 문제 ▶' : '배움 정리하기 🎙️'}
              </button>
            </div>
          </div>
        </div>
      );

      /* ── 녹음 ── */
      if(phase==="recording") return (
        <div className="flex items-center justify-center p-4 bg-orange-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div className="bg-white rounded-3xl p-8 max-w-4xl w-full shadow-2xl border-8 border-orange-200 flex flex-row gap-8 items-center">
            <div className="flex-shrink-0 flex flex-col items-center">
              <div className="text-6xl mb-3 animate-bounce">🎙️</div>
              <h2 className="text-lg text-orange-700 font-black text-center">배운 내용<br/>설명해보기</h2>
            </div>
            <div className="flex-1 flex flex-col gap-4">
              <div className="bg-orange-100 p-4 rounded-2xl">
                <p className="text-lg font-bold text-slate-700 break-keep leading-relaxed">
                  친구에게 방금 배운 사건의 순서를<br/>자신의 말로 다시 설명해 보아요!
                </p>
              </div>
              {!isRecording && !audioBlob && (
                <button onClick={handleStartRecording} className="w-full bg-slate-100 border-8 border-slate-300 py-6 rounded-2xl flex items-center justify-center gap-4 cursor-pointer active:scale-95 transition-all shadow-lg text-slate-500">
                  <span className="text-5xl">🎤</span>
                  <span className="text-xl font-bold">내 목소리로 정리하기</span>
                </button>
              )}
              {isRecording && (
                <button onClick={handleStopRecording} className="w-full bg-red-100 border-8 border-red-500 py-6 rounded-2xl flex items-center justify-center gap-4 cursor-pointer active:scale-95 transition-all shadow-lg text-red-600 animate-pulse">
                  <span className="text-5xl">⏹️</span>
                  <span className="text-xl font-bold">정리 완료 (누르기)</span>
                </button>
              )}
              {audioBlob && (
                <div className="bg-green-50 border-4 border-green-200 p-4 rounded-2xl">
                  <div className="text-lg font-bold text-green-700 mb-3">녹음 완료! 멋지게 설명했네요 🎧</div>
                  <audio src={URL.createObjectURL(audioBlob)} controls className="w-full rounded-full shadow-md"></audio>
                </div>
              )}
              {audioBlob && (
                <div className="flex gap-4">
                  <button onClick={handleDiscardRecording} className="flex-1 bg-slate-200 text-slate-700 text-lg py-4 rounded-2xl font-bold active:scale-95 transition">다시하기</button>
                  <button onClick={()=>saveAndFinish(audioBase64)} className="flex-[2] bg-green-500 hover:bg-green-600 text-white text-lg py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">상장 받으러 가기! 🏆</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );

      /* ── 전송 중 ── */
      if(phase==="submitting") return (
        <div className="flex flex-col items-center justify-center p-4 text-center bg-white" style={{height:'100vh',overflow:'hidden'}}>
          <div className="text-7xl mb-5 animate-spin">⏳</div>
          <div className="text-2xl font-bold text-slate-600">선생님께 멋진 설명을 보내는 중이에요...</div>
        </div>
      );

      /* ── 결과 보고 ── */
      if(phase==="report") return (
        <div className="flex items-center justify-center p-4 bg-green-50" style={{height:'100vh',overflow:'hidden'}}>
          <SoundToggle soundOn={soundOn} setSoundOn={setSoundOn}/>
          <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-5xl w-full border-8 border-amber-200 flex flex-row gap-8">
            {/* 상장 */}
            <div className="flex-1 bg-amber-50 p-7 rounded-2xl border-4 border-dashed border-amber-300 flex flex-col justify-center items-center text-center">
              <div className="text-6xl mb-3">🏆</div>
              <h1 className="text-3xl font-black text-amber-800 mb-4">훌륭한 이야기꾼 상</h1>
              <div className="text-2xl font-bold text-slate-600 mb-5">
                <span className="text-indigo-600 underline decoration-4 text-4xl">{selectedStudent}</span> 어린이
              </div>
              <p className="text-base text-slate-600 font-bold leading-relaxed break-keep">
                위 어린이는 주어진 사건의 순서를<br/>올바르게 이해하고 설명하였기에<br/>이 상장을 수여합니다.
              </p>
            </div>
            {/* 결과 + 액션 */}
            <div className="flex-1 flex flex-col justify-center gap-5">
              <div className="bg-blue-50 p-6 rounded-2xl border-4 border-blue-100 flex flex-col items-center">
                <div className="text-xl font-bold text-slate-700 mb-3">최종 탐험 결과</div>
                <div className="text-6xl font-black text-blue-500">{score} <span className="text-3xl text-slate-400">/ {activeQuestions.length}</span></div>
              </div>
              <button onClick={downloadReport} className="w-full bg-green-500 hover:bg-green-600 text-white text-xl py-5 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-3 transition active:scale-95">
                <span className="text-4xl">📥</span> 수료증 저장하기
              </button>
              <button onClick={()=>window.location.reload()} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 text-lg py-4 rounded-2xl font-bold border-4 border-slate-200 transition active:scale-95">
                처음으로 돌아가기
              </button>
            </div>
          </div>
        </div>
      );

      return null;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
